<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Studio</title>
  <script>
    // Applied before first paint to avoid a light-mode flash on load.
    if (localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
  <style>
    :root {
      color-scheme: light;
      --panel: #ffffff;
      --panel-strong: #f8fafc;
      --border: #dbe4f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --accent-dark: #1e3a8a;
      --body-grad-1: #f8fbff;
      --body-grad-2: #eef4ff;
      --glass-bg: rgba(255, 255, 255, 0.92);
    }

    :root.dark {
      color-scheme: dark;
      --panel: #1e293b;
      --panel-strong: #0f172a;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-soft: #1e3a8a;
      --accent-dark: #93c5fd;
      --body-grad-1: #0f172a;
      --body-grad-2: #111c33;
      --glass-bg: rgba(15, 23, 42, 0.85);
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, var(--body-grad-1) 0%, var(--body-grad-2) 100%);
      color: var(--text);
      transition: background 0.2s ease, color 0.2s ease;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .dict-card {
      position: relative;
      overflow: hidden;
    }

    .dict-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    .pill {
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.35rem 0.7rem;
      font-size: 0.8rem;
      background: var(--panel);
      color: var(--muted);
    }

    .compact-card {
      padding: 0.45rem 0.6rem;
      border-radius: 0.75rem;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    .compact-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    .meaning-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
      font-size: 0.75rem;
      color: #475569;
    }

    .draft-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.7rem;
      background: linear-gradient(135deg, #eff6ff 0%, #f8fbff 100%);
      border-color: #bfdbfe;
    }

    .modal-backdrop {
      display: none;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .section-row + .section-row {
      margin-top: 0.6rem;
      padding-top: 0.6rem;
      border-top: 1px solid var(--border);
    }

    /* .section-actions is a sibling of <details> itself, positioned relative
       to this wrapper — NOT a descendant of <details> at all (not even a
       sibling of <summary> inside it). Chromium refuses to render or
       hit-test any non-summary child of a closed <details>, and that isn't
       something CSS can override (display/content-visibility overrides had
       no effect in practice — the geometry gets reported but nothing paints
       or receives clicks). A true sibling of <details> is unaffected. */
    .section-row {
      position: relative;
    }

    .section-group > summary {
      cursor: pointer;
      user-select: none;
      list-style: revert;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.15rem 2.75rem 0.15rem 0;
      display: flex;
      align-items: center;
    }

    .section-group > summary::marker {
      font-size: 0.6rem;
    }

    .section-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .section-actions {
      position: absolute;
      top: 0.15rem;
      right: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .section-action-btn {
      font-size: inherit;
      font-weight: inherit;
      letter-spacing: normal;
      text-transform: none;
      line-height: 1;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .section-action-btn:hover {
      color: var(--accent);
    }

    .section-group .section-body {
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

        </div>
      </div>
    </main>
  </div>

    function getCurrentLanguageData() {

    function normalize(text) {
      return (text || '').trim().toLowerCase();
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function translateText(text, sourceLang, targetLang) {
      if (!text || sourceLang === targetLang) return '';
      try {
        // Google's free client-side translation endpoint — real machine
        // translation (no API key), unlike MyMemory's crowd-sourced lookup
        // which returns bad matches for short/casual words like "Hi".
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
        const response = await fetch(url);
        const data = await response.json();
        const segments = data && data[0];
        if (!Array.isArray(segments)) return '';
        return segments.map(segment => segment[0] || '').join('').trim();
      } catch (err) {
        console.error('Auto-translation failed', err);
        return '';
      }
    }

    function transliterateJapaneseToRomaji(text) {
      if (!text) return '';

      const singleKanaMap = {
        'あ': 'a', 'い': 'i', 'う': 'u', 'え': 'e', 'お': 'o',
        'か': 'ka', 'き': 'ki', 'く': 'ku', 'け': 'ke', 'こ': 'ko',
        'さ': 'sa', 'し': 'shi', 'す': 'su', 'せ': 'se', 'そ': 'so',
        'た': 'ta', 'ち': 'chi', 'つ': 'tsu', 'て': 'te', 'と': 'to',
        'な': 'na', 'に': 'ni', 'ぬ': 'nu', 'ね': 'ne', 'の': 'no',
        'は': 'ha', 'ひ': 'hi', 'ふ': 'fu', 'へ': 'he', 'ほ': 'ho',
        'ま': 'ma', 'み': 'mi', 'む': 'mu', 'め': 'me', 'も': 'mo',
        'や': 'ya', 'ゆ': 'yu', 'よ': 'yo',
        'ら': 'ra', 'り': 'ri', 'る': 'ru', 'れ': 're', 'ろ': 'ro',
        'わ': 'wa', 'を': 'wo', 'ん': 'n',
        'が': 'ga', 'ぎ': 'gi', 'ぐ': 'gu', 'げ': 'ge', 'ご': 'go',
        'ざ': 'za', 'じ': 'ji', 'ず': 'zu', 'ぜ': 'ze', 'ぞ': 'zo',
        'だ': 'da', 'ぢ': 'ji', 'づ': 'zu', 'で': 'de', 'ど': 'do',
        'ば': 'ba', 'び': 'bi', 'ぶ': 'bu', 'べ': 'be', 'ぼ': 'bo',
        'ぱ': 'pa', 'ぴ': 'pi', 'ぷ': 'pu', 'ぺ': 'pe', 'ぽ': 'po',
        'ゃ': 'ya', 'ゅ': 'yu', 'ょ': 'yo', 'っ': 'tsu'
      };

      const comboKanaMap = {
        'きゃ': 'kya', 'きゅ': 'kyu', 'きょ': 'kyo',
        'しゃ': 'sha', 'しゅ': 'shu', 'しょ': 'sho',
        'ちゃ': 'cha', 'ちゅ': 'chu', 'ちょ': 'cho',
        'にゃ': 'nya', 'にゅ': 'nyu', 'にょ': 'nyo',
        'ひゃ': 'hya', 'ひゅ': 'hyu', 'ひょ': 'hyo',
        'みゃ': 'mya', 'みゅ': 'myu', 'みょ': 'myo',
        'りゃ': 'rya', 'りゅ': 'ryu', 'りょ': 'ryo',
        'ぎゃ': 'gya', 'ぎゅ': 'gyu', 'ぎょ': 'gyo',
        'じゃ': 'ja', 'じゅ': 'ju', 'じょ': 'jo',
        'びゃ': 'bya', 'びゅ': 'byu', 'びょ': 'byo',
        'ぴゃ': 'pya', 'ぴゅ': 'pyu', 'ぴょ': 'pyo',
        'だ': 'da'
      };

      // A plain vowel kana right after a syllable ending in the same vowel (or う
      // after an お-ending syllable) lengthens it — write that as a macron rather
      // than doubling the letter, e.g. どう -> "dō" not "dou".
      const plainVowelMap = {
        'あ': 'a', 'い': 'i', 'う': 'u', 'え': 'e', 'お': 'o',
        'ア': 'a', 'イ': 'i', 'ウ': 'u', 'エ': 'e', 'オ': 'o'
      };
      const macronMap = { a: 'ā', i: 'ī', u: 'ū', e: 'ē', o: 'ō' };

      const normalized = String(text)
        .replace(/\s+/g, '')
        .replace(/（/g, '(')
        .replace(/）/g, ')');

      const syllables = [];
      let index = 0;

      while (index < normalized.length) {
        const char = normalized[index];
        const next = normalized[index + 1];

        if (!char) break;
        if (char === 'ー') {
          const previous = syllables[syllables.length - 1];
          const lastVowel = previous ? previous.slice(-1) : '';
          if (previous && macronMap[lastVowel]) {
            syllables[syllables.length - 1] = previous.slice(0, -1) + macronMap[lastVowel];
          }
          index += 1;
          continue;
        }

        if (char === 'っ') {
          const nextKana = next && (comboKanaMap[next] || singleKanaMap[next] || next);
          if (nextKana) {
            // Push just the doubling consonant — the next character's own syllable
            // (processed on the following loop iteration) supplies the second copy.
            syllables.push(nextKana[0]);
          }
          index += 1;
          continue;
        }

        if (plainVowelMap[char]) {
          const vowel = plainVowelMap[char];
          const previous = syllables[syllables.length - 1];
          const lastVowel = previous ? previous.slice(-1) : '';
          const isLongVowel = previous && (lastVowel === vowel || (vowel === 'u' && lastVowel === 'o'));
          if (isLongVowel) {
            syllables[syllables.length - 1] = previous.slice(0, -1) + macronMap[lastVowel];
            index += 1;
            continue;
          }
        }

        const katakana = char && char.charCodeAt(0) >= 0x30A0 && char.charCodeAt(0) <= 0x30FF;
        const hiragana = char && char.charCodeAt(0) >= 0x3040 && char.charCodeAt(0) <= 0x309F;

        if (katakana) {
          const hiraganaChar = String.fromCharCode(char.charCodeAt(0) - 0x60);
          const combo = comboKanaMap[hiraganaChar + (next || '')] || comboKanaMap[hiraganaChar];
          if (combo) {
            syllables.push(combo);
            index += 2;
            continue;
          }
          const single = singleKanaMap[hiraganaChar];
          if (single) {
            syllables.push(single);
            index += 1;
            continue;
          }
        }

        if (hiragana) {
          const combo = comboKanaMap[char + (next || '')] || comboKanaMap[char];
          if (combo) {
            syllables.push(combo);
            index += 2;
            continue;
          }
          const single = singleKanaMap[char];
          if (single) {
            syllables.push(single);
            index += 1;
            continue;
          }
        }

        if (/[a-zA-Z]/.test(char)) {
          syllables.push(char.toLowerCase());
        }
        index += 1;
      }

      return syllables.join('');
    }

    async function getRomanization(text, sourceLang, targetLang) {
      if (!text || sourceLang === 'en') return '';
      try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&dt=rm&q=${encodeURIComponent(text)}`;
        const response = await fetch(url);
        const data = await response.json();
        const segments = data && data[0];
        if (!Array.isArray(segments)) return '';
        // Romanization is appended as an extra segment shaped like [null, null, ...romanizedText].
        const romanEntry = segments.find(segment => segment[0] === null && segment[1] === null);
        if (!romanEntry) return '';
        const romanized = romanEntry.slice(2).find(value => typeof value === 'string' && value.trim());
        return romanized || '';
      } catch (err) {
        console.error('Romanization failed', err);
        return '';
      }
    }

    // Romanizes a native word for languages other than Japanese (which has its
    // own internal transliterator, tried first, for speed and to avoid a round
    // trip when there's no kanji involved).
    async function romanizeNativeWord(text, nativeLang) {
      if (nativeLang === 'en' || !text) return '';
      if (nativeLang === 'ja') {
        const containsKanji = /[一-鿿]/.test(text);
        if (!containsKanji) {
          const internal = transliterateJapaneseToRomaji(text);
          if (internal) return internal;
        }
      }
      return getRomanization(text, nativeLang, 'en');
    }

    // Decides which direction a quick-add entry is being typed in. Only the
    // Japanese dictionary gets this bidirectional smarts for now — other
    // languages always treat the typed text as the native word.
    function detectQuickAddDirection(text) {
      if (state.language !== 'japanese') return 'toEnglish';
      const isAllLatin = /^[a-zA-Z\s'".,!?-]+$/.test((text || '').trim());
      return isAllLatin ? 'toNative' : 'toEnglish';
    }

    // Resolves a single typed string into {word, pronunciation, englishMeaning}
    // (Firebase's actual w/p/em fields), regardless of which direction it was
    // typed in — the direction only changes what's derived from what.
    async function resolveQuickAddFields(text) {
      const direction = detectQuickAddDirection(text);
      const nativeLang = langCodeMap[state.language] || 'ja';

      if (direction === 'toNative') {
        const englishMeaning = text;
        const word = (await translateText(text, 'en', nativeLang)) || text;
        const pronunciation = await romanizeNativeWord(word, nativeLang);
        return { direction, word, pronunciation, englishMeaning };
      }

      const word = text;
      const [pronunciation, englishMeaning] = await Promise.all([
        romanizeNativeWord(word, nativeLang),
        translateText(word, nativeLang, 'en')
      ]);
      return { direction, word, pronunciation, englishMeaning };
    }

    // Firebase shape: words/{language}/{section}/{id} -> { w, p, em, c }.
    // Flattens ONE section's snapshot into the entry list the rest of the app
    // works with — sections are always fetched individually, on demand, never
    // as a whole-language read (see ensureSectionLoaded).
    function flattenSectionSnapshot(language, section, snapshot) {
      const val = snapshot.val() || {};
      const entries = [];
      Object.entries(val).forEach(([id, data]) => {
        if (!data) return;
        entries.push({
          id,
          word: data.w || '',
          pronunciation: data.p || '',
          englishMeaning: data.em || '',
          language,
          section,
          createdAt: data.c || 0
        });
      });
      return entries.sort((a, b) => (Number(b.createdAt) || 0) - (Number(a.createdAt) || 0));
    }

    function normalizeSectionName(name) {
      return (name || '').trim().toUpperCase() || 'UNCATEGORIZED';
    }

    function sectionSort(a, b) {
      if (a === 'UNCATEGORIZED') return 1;
      if (b === 'UNCATEGORIZED') return -1;
      return a.localeCompare(b);
    }

    function getSortedSectionNames() {
      return Object.keys(state.sectionSummary).sort(sectionSort);
    }

    // On-demand duplicate check when adding a brand-new word — a single direct
    // read of this language's words, done only at the moment "Add" is clicked
    // (not maintained as a standing index).
    async function wordExistsInLanguage(normalizedWord) {
      try {
        const snapshot = await wordsRef.child(state.language).once('value');
        const languageData = snapshot.val() || {};
        return Object.values(languageData).some(sectionWords =>
          Object.values(sectionWords || {}).some(data => data && normalize(data.w || '') === normalizedWord)
        );
      } catch (err) {
        console.error('Duplicate check failed', err);
        return false;
      }
    }

    // Atomically bumps a section's live count in sectionSummary — this is how the
    // header counts stay in sync with the actual data, without ever having to
    // re-read the whole language to recompute them.
    function bumpSectionCount(language, section, delta) {
      return database.ref(`sectionSummary/${language}/${section}`).transaction(current => {
        const next = (Number(current) || 0) + delta;
        return next > 0 ? next : null;
      });
    }

    // Runs at most once per language, ever (guarded by sectionSummary already
    // existing): folds any legacy mixed-case section keys into their upper-case
    // counterpart and (re)computes the section counts. This is the ONLY place
    // that reads a language's entire word tree — everything else fetches one
    // section at a time.
    async function bootstrapLanguageIfNeeded(language) {
      if (!state.isAdmin) return;
      try {
        const summarySnap = await database.ref(`sectionSummary/${language}`).once('value');
        if (summarySnap.exists()) return;

        const wordsSnap = await wordsRef.child(language).once('value');
        const raw = wordsSnap.val() || {};
        const updates = {};
        const summary = {};

        Object.entries(raw).forEach(([section, words]) => {
          const upper = normalizeSectionName(section);
          Object.entries(words || {}).forEach(([id, data]) => {
            if (!data) return;
            if (section !== upper) {
              updates[`words/${language}/${upper}/${id}`] = data;
              updates[`words/${language}/${section}/${id}`] = null;
            }
            summary[upper] = (summary[upper] || 0) + 1;
          });
        });

        updates[`sectionSummary/${language}`] = summary;
        await database.ref().update(updates);
      } catch (err) {
        console.error(`Failed to bootstrap language "${language}"`, err);
      }
    }

    // Fetches (once) and live-subscribes to a single section's words. Resolves
    // with whatever's cached already if this section was loaded before — the
    // listener set up on first load keeps that cache fresh from then on.
    function ensureSectionLoaded(section) {
      const language = state.language;
      if (state.sectionCache.has(section)) {
        return Promise.resolve(state.sectionCache.get(section));
      }
      return new Promise((resolve) => {
        const sectionRef = wordsRef.child(language).child(section);
        let resolved = false;
        sectionRef.on('value', (snapshot) => {
          const entries = flattenSectionSnapshot(language, section, snapshot);
          state.sectionCache.set(section, entries);
          renderSectionBodyIfPresent(section, entries);
          if (!resolved) {
            resolved = true;
            resolve(entries);
          }
        }, (err) => {
          console.error(`Failed to load section "${section}"`, err);
          if (!resolved) {
            resolved = true;
            resolve([]);
          }
        });
        state.sectionListeners.set(section, sectionRef);
      });
    }

    // Headers + counts only — this is the lightweight listener that drives the
    // default page-load view. Actual word data is never pulled in here.
    function subscribeSectionSummary(language) {
      const ref = database.ref(`sectionSummary/${language}`);
      ref.on('value', (snapshot) => {
        state.sectionSummary = snapshot.val() || {};
        renderCurrentView();
      }, (err) => {
        console.error('Failed to subscribe to section summary', err);
      });
      return ref;
    }

    function teardownLanguageData() {
      if (state.sectionSummaryRef) {
        state.sectionSummaryRef.off('value');
        state.sectionSummaryRef = null;
      }
      state.sectionListeners.forEach(ref => ref.off('value'));
      state.sectionListeners.clear();
      state.sectionCache.clear();
      state.sectionSummary = {};
      state.expandedSections.clear();
    }

    function switchLanguage(language) {
      teardownLanguageData();
      state.language = language;
      renderCurrentView(); // clears the list immediately instead of showing stale data

      // Bootstrap is a background, best-effort, admin-only write — it must never
      // block the summary subscription below (the lesson from the earlier bug
      // where a blocked migration write kept the whole page from rendering).
      bootstrapLanguageIfNeeded(language).catch(err => {
        console.error('Failed to bootstrap language index', err);
      });
      state.sectionSummaryRef = subscribeSectionSummary(language);
    }

    function attachCardInteractions(card, entry) {
      card.addEventListener('dblclick', (event) => {
        event.preventDefault();
        event.stopPropagation();
        if (!state.isAdmin) return;
        startEditFromCard(entry);
      });
    }

    function getAlphaGroupKey(word) {
      const trimmed = (word || '').trim();
      if (!trimmed) return '#';
      const first = trimmed[0];
      return /[a-zA-Z]/.test(first) ? first.toUpperCase() : first;
    }

    function getDistinctSections() {
      return Object.keys(state.sectionSummary)
        .filter(section => section !== 'UNCATEGORIZED')
        .sort((a, b) => a.localeCompare(b));
    }

    function buildDictionaryCard(entry) {
      const card = document.createElement('article');
      card.className = 'compact-card dict-card transition-all duration-150 flex items-center justify-between gap-2 py-2';

      const pronunciation = entry.pronunciation || '';
      const englishMeaning = entry.englishMeaning || '';

      card.innerHTML = `
        <div class="min-w-0 flex-1 flex items-baseline gap-3">
          <div class="min-w-[100px] truncate text-sm font-semibold text-slate-900 leading-tight dark:text-slate-100">${escapeHtml(entry.word)}</div>
          <div class="min-w-[80px] truncate text-xs text-slate-500 leading-tight dark:text-slate-400">${escapeHtml(pronunciation)}</div>
          <div class="flex-1 truncate text-xs text-slate-600 leading-tight dark:text-slate-300">${escapeHtml(englishMeaning)}</div>
        </div>
      `;
      attachCardInteractions(card, entry);
      return card;
    }

    // Decides which view to show: search filters the section list itself down to
    // matching section names (it never touches word content); the alpha-grouped
    // view needs everything and is loaded on demand; otherwise it's the normal
    // lazy per-section header view (the default, page-load-cheap case).
    function renderCurrentView() {
      if (!normalize(state.query) && state.groupMode === 'alpha') {
        loadAllSectionsAndRenderAlpha();
      } else {
        renderSectionHeaders();
      }
    }

    // Default view: section headers + counts only, straight from sectionSummary.
    // A section's actual word cards are fetched (via ensureSectionLoaded) only
    // when that section is expanded, or quizzed/read. A search query filters
    // this list down to sections whose NAME matches — it never searches word
    // content, so it never needs to fetch anything beyond the header list.
    function renderSectionHeaders() {
      const query = normalize(state.query);
      const sections = getSortedSectionNames().filter(section => !query || section.toLowerCase().includes(query));
      const totalCount = sections.reduce((sum, section) => sum + (state.sectionSummary[section] || 0), 0);
      dictionaryCount.textContent = `${totalCount} ${totalCount === 1 ? 'entry' : 'entries'}`;
      dictionaryList.innerHTML = '';
      state.sectionHeaderDomRefs = new Map();

      if (!sections.length) return;

      sections.forEach(section => {
        const wrapper = buildSectionDetailsShell(section, state.sectionSummary[section] || 0);
        state.sectionHeaderDomRefs.set(section, wrapper);
        dictionaryList.appendChild(wrapper);
        if (state.expandedSections.has(section)) {
          wrapper.querySelector('details').open = true;
          loadAndRenderSectionBody(section);
        }
      });
    }

    // Returns a wrapper <div> containing the <details> plus a sibling actions
    // bar — the actions bar can't live inside the <details> at all (not even
    // as a sibling of <summary>): Chromium refuses to render or hit-test any
    // non-summary child of a closed <details>, and that isn't something CSS
    // can override (display/content-visibility overrides had no effect). It
    // also can't live inside <summary> — interactive controls nested there
    // aren't reliably reachable by keyboard/assistive tech. A true sibling of
    // <details> itself is unaffected by any of that.
    function buildSectionDetailsShell(section, count) {
      const wrapper = document.createElement('div');
      wrapper.className = 'section-row';

      const details = document.createElement('details');
      details.className = 'section-group';

      const summary = document.createElement('summary');
      summary.innerHTML = `<span class="section-label">${escapeHtml(section)} (${count})</span>`;
      details.appendChild(summary);

      const body = document.createElement('div');
      body.className = 'section-body space-y-2';
      body.innerHTML = '<div class="text-xs text-slate-400 dark:text-slate-500 py-1">Loading…</div>';
      details.appendChild(body);

      details.addEventListener('toggle', () => {
        if (details.open) {
          state.expandedSections.add(section);
          loadAndRenderSectionBody(section);
        } else {
          state.expandedSections.delete(section);
        }
      });

      wrapper.appendChild(details);

      const actions = document.createElement('span');
      actions.className = 'section-actions';
      actions.innerHTML = `
        <button type="button" class="section-action-btn" data-section-quiz title="Quiz this section">✦</button>
        <button type="button" class="section-action-btn" data-section-read title="Read this section">▶</button>
      `;
      actions.querySelector('[data-section-quiz]').addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        startSectionQuiz(section);
      });
      actions.querySelector('[data-section-read]').addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        startSectionReading(section);
      });
      wrapper.appendChild(actions);

      return wrapper;
    }

    function loadAndRenderSectionBody(section) {
      ensureSectionLoaded(section).then(entries => renderSectionBodyIfPresent(section, entries));
    }

    // Called both right after a section's data first arrives and on every later
    // live update to it — a no-op if that section isn't currently on screen
    // (e.g. it's been filtered out by search, or the view is alpha-grouped).
    function renderSectionBodyIfPresent(section, entries) {
      const details = state.sectionHeaderDomRefs && state.sectionHeaderDomRefs.get(section);
      if (!details || !dictionaryList.contains(details)) return;
      const body = details.querySelector('.section-body');
      if (!body) return;

      body.innerHTML = '';
      if (!entries.length) {
        body.innerHTML = '<div class="text-xs text-slate-400 dark:text-slate-500 py-1">No words yet.</div>';
        return;
      }
      entries.forEach(entry => body.appendChild(buildDictionaryCard(entry)));
    }

    // Alpha grouping cuts across sections, so it genuinely needs every section's
    // data — this is the one deliberate action that triggers a full load.
    async function loadAllSectionsAndRenderAlpha() {
      const sections = getSortedSectionNames();
      dictionaryList.innerHTML = '<div class="text-xs text-slate-400 dark:text-slate-500 py-2">Loading all sections…</div>';
      dictionaryCount.textContent = '…';
      await Promise.all(sections.map(section => ensureSectionLoaded(section)));
      if (state.groupMode !== 'alpha') return; // user switched back before this resolved
      renderAlphaGrouped();
    }

    function renderAlphaGrouped() {
      const allEntries = [];
      state.sectionCache.forEach(entries => allEntries.push(...entries));

      dictionaryCount.textContent = `${allEntries.length} ${allEntries.length === 1 ? 'entry' : 'entries'}`;
      dictionaryList.innerHTML = '';
      if (!allEntries.length) return;

      const groups = new Map();
      allEntries.forEach(entry => {
        const key = getAlphaGroupKey(entry.word);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(entry);
      });

      Array.from(groups.keys()).sort((a, b) => a.localeCompare(b)).forEach(key => {
        const entries = groups.get(key);
        const details = document.createElement('details');
        details.className = 'section-group';
        if (state.expandedSections.has(key)) details.open = true;
        details.addEventListener('toggle', () => {
          if (details.open) state.expandedSections.add(key);
          else state.expandedSections.delete(key);
        });

        const summary = document.createElement('summary');
        summary.innerHTML = `<span class="section-label">${escapeHtml(key)} (${entries.length})</span>`;
        details.appendChild(summary);

        const body = document.createElement('div');
        body.className = 'section-body space-y-2';
        entries.forEach(entry => body.appendChild(buildDictionaryCard(entry)));
        details.appendChild(body);

        dictionaryList.appendChild(details);
      });
    }

    function renderSectionDropdown(filterText) {
      const query = (filterText || '').trim().toLowerCase();
      const options = getDistinctSections().filter(name => name.toLowerCase().includes(query));
      if (!options.length) {
        sectionDropdown.classList.add('hidden');
        sectionDropdown.innerHTML = '';
        return;
      }
      sectionDropdown.innerHTML = options.map(name => `
        <button type="button" data-section-option="${escapeHtml(name)}" class="block w-full truncate px-3 py-1.5 text-left text-sm text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-700">${escapeHtml(name)}</button>
      `).join('');
      sectionDropdown.classList.remove('hidden');
    }

    // ---- Quick add: single-field word entry, traversed field by field ----
    //
    // Type a word (English or native script — direction is auto-detected),
    // then Enter steps through the resolved fields one at a time, loading each
    // into the same input in place of the last (word -> pronunciation ->
    // meaning), editable at every stage. A floating panel below the input
    // shows all three throughout, highlighting whichever one is currently
    // loaded into the field. A final Enter (from the meaning stage) reveals
    // the category picker in the same panel. Escape cancels at any point.
    //
    // Independently, a 2-second poll compares the field's current text to
    // what it held at the last check: if it changed, that's treated as a
    // fresh edit — a full re-translation at the word stage, or a direct
    // correction to the current field at the pronunciation/meaning stages —
    // and the panel is refreshed either way.

    // Matches the per-direction ordering the app already showed in the
    // (now-removed) review popup — same fields, same order, just traversed
    // one at a time instead of shown all at once.
    function getQuickAddFieldOrder(direction) {
      return direction === 'toNative'
        ? ['englishMeaning', 'word', 'pronunciation']
        : ['word', 'pronunciation', 'englishMeaning'];
    }

    function buildQuickAddParts(resolved) {
      return getQuickAddFieldOrder(resolved.direction).map(key => ({ key, value: resolved[key] }));
    }

    // One line, no labels — just the typed word, its pronunciation, and the
    // translated word, dot-separated, with whichever one is currently loaded
    // into the input highlighted.
    function renderQuickAddPanel() {
      const resolved = state.quickAdd.resolved;
      if (!resolved) {
        quickAddPanel.classList.add('hidden');
        return;
      }
      const parts = buildQuickAddParts(resolved);
      const pieces = parts.map((part, index) => `<span class="${
        index === state.quickAdd.stageIndex
          ? 'rounded bg-blue-50 px-1 font-semibold text-blue-900 dark:bg-blue-950/40 dark:text-blue-200'
          : 'text-slate-500 dark:text-slate-400'
      }">${escapeHtml(part.value || '—')}</span>`);
      quickAddPreviewRows.innerHTML = `
        <div class="flex flex-wrap items-center gap-1.5 px-1 py-1 text-xs">
          ${pieces.join('<span class="text-slate-300 dark:text-slate-600">·</span>')}
        </div>
      `;
      quickAddDeleteBtn.classList.toggle('hidden', !state.quickAdd.editingId);
      quickAddPanel.classList.remove('hidden');
    }

    let quickAddCheckTimer = null;

    function startQuickAddChecker() {
      if (quickAddCheckTimer) return;
      quickAddCheckTimer = setInterval(checkQuickAddForChanges, 2000);
    }

    function stopQuickAddChecker() {
      clearInterval(quickAddCheckTimer);
      quickAddCheckTimer = null;
    }

    // The 2-second poll: only reacts when the field's text actually differs
    // from what it held at the last check.
    async function checkQuickAddForChanges() {
      if (state.quickAdd.mode !== 'entering') return;
      const text = quickAddInput.value.trim();
      if (text === state.quickAdd.lastCheckedText) return;
      if (!text) {
        state.quickAdd.lastCheckedText = text;
        return;
      }

      const stageIndex = state.quickAdd.stageIndex;
      if (stageIndex === 0) {
        const resolved = await resolveQuickAddFields(text);
        // Bail if the field moved on while this was resolving.
        if (state.quickAdd.mode !== 'entering' || state.quickAdd.stageIndex !== 0 || quickAddInput.value.trim() !== text) return;
        state.quickAdd.resolved = resolved;
      } else if (state.quickAdd.resolved) {
        const key = getQuickAddFieldOrder(state.quickAdd.resolved.direction)[stageIndex];
        state.quickAdd.resolved[key] = text;
      }
      state.quickAdd.lastCheckedText = text;
      renderQuickAddPanel();
    }

    function resetQuickAdd() {
      stopQuickAddChecker();
      state.quickAdd = { mode: 'entering', stageIndex: 0, resolved: null, lastCheckedText: null, editingId: null, editingOriginSection: null };
      quickAddInput.value = '';
      quickAddInput.readOnly = false;
      quickAddInput.disabled = false;
      quickAddInput.placeholder = 'Type a word…';
      quickAddPanel.classList.add('hidden');
      quickAddPreviewRows.innerHTML = '';
      quickAddCategorySlot.classList.add('hidden');
      sectionInput.value = '';
      sectionDropdown.classList.add('hidden');
      sectionInputHome.appendChild(sectionInputWrapper);
    }

    function showQuickAddCategoryStep() {
      state.quickAdd.mode = 'category';
      stopQuickAddChecker();
      quickAddInput.readOnly = true;
      sectionInput.value = '';
      quickAddCategorySlot.appendChild(sectionInputWrapper);
      quickAddCategorySlot.classList.remove('hidden');
      sectionInput.focus();
    }

    // The Enter handler while composing (mode 'entering'): advances one stage
    // at a time — word -> pronunciation -> meaning -> category — capturing
    // any manual edit at the current stage before moving to the next.
    async function advanceQuickAddStage() {
      if (state.quickAdd.mode !== 'entering') return;
      const text = quickAddInput.value.trim();
      if (!text) return;

      const stageIndex = state.quickAdd.stageIndex;

      if (stageIndex === 0) {
        // Reuse the poller's resolution if it already caught up with this
        // exact text; otherwise resolve it now rather than make the user wait
        // for the next 2-second tick.
        if (!state.quickAdd.resolved || state.quickAdd.lastCheckedText !== text) {
          quickAddInput.disabled = true;
          quickAddInput.placeholder = 'Translating…';
          state.quickAdd.resolved = await resolveQuickAddFields(text);
          state.quickAdd.lastCheckedText = text;
          quickAddInput.disabled = false;
        }
      } else {
        const key = getQuickAddFieldOrder(state.quickAdd.resolved.direction)[stageIndex];
        state.quickAdd.resolved[key] = text;
      }
      renderQuickAddPanel();

      if (stageIndex < 2) {
        state.quickAdd.stageIndex = stageIndex + 1;
        const nextKey = getQuickAddFieldOrder(state.quickAdd.resolved.direction)[state.quickAdd.stageIndex];
        const nextValue = state.quickAdd.resolved[nextKey] || '';
        quickAddInput.value = nextValue;
        state.quickAdd.lastCheckedText = nextValue;
        quickAddInput.select();
        renderQuickAddPanel();
        return;
      }

      if (!state.quickAdd.editingId) {
        const exists = await wordExistsInLanguage(normalize(state.quickAdd.resolved.word));
        if (exists) {
          window.alert(`"${state.quickAdd.resolved.word}" already exists in the ${getCurrentLanguageData().label} dictionary.`);
          resetQuickAdd();
          return;
        }
      }
      showQuickAddCategoryStep();
    }

    async function quickAddConfirmCategory() {
      if (state.quickAdd.mode !== 'category') return;
      const section = sectionInput.value.trim().toUpperCase() || 'UNCATEGORIZED';
      const resolved = state.quickAdd.resolved;
      const fields = { w: resolved.word, p: resolved.pronunciation, em: resolved.englishMeaning };
      const { editingId, editingOriginSection } = state.quickAdd;

      try {
        if (editingId) {
          await wordsRef.child(state.language).child(editingOriginSection).child(editingId).update(fields);
          if (section !== editingOriginSection) {
            const snapshot = await wordsRef.child(state.language).child(editingOriginSection).child(editingId).once('value');
            const data = snapshot.val();
            if (data) {
              await database.ref().update({
                [`words/${state.language}/${editingOriginSection}/${editingId}`]: null,
                [`words/${state.language}/${section}/${editingId}`]: data
              });
              await Promise.all([
                bumpSectionCount(state.language, editingOriginSection, -1),
                bumpSectionCount(state.language, section, 1)
              ]);
            }
          }
        } else {
          await wordsRef.child(state.language).child(section).push({ ...fields, c: Date.now() });
          await bumpSectionCount(state.language, section, 1);
        }
      } catch (err) {
        console.error('Failed to save word', err);
        window.alert('Failed to save word. See console for details.');
      }
      resetQuickAdd();
    }

    function quickAddCancel() {
      resetQuickAdd();
    }

    function startEditFromCard(entry) {
      resetQuickAdd();
      state.quickAdd.editingId = entry.id;
      state.quickAdd.editingOriginSection = entry.section;
      quickAddInput.value = entry.word;
      quickAddContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
      quickAddInput.focus();
      startQuickAddChecker();
    }

    async function deleteWordEntry(entry) {
      if (!entry) return;
      if (!window.confirm(`Delete "${entry.word}"?`)) return;
      if (!state.isAdmin) {
        window.alert('You are not authorized to delete this entry.');
        return;
      }
      try {
        await wordsRef.child(state.language).child(entry.section).child(entry.id).remove();
        await bumpSectionCount(state.language, entry.section, -1);
        if (state.quickAdd.editingId === entry.id) resetQuickAdd();
      } catch (err) {
        console.error('Failed to delete entry', err);
        window.alert('Failed to delete entry. See console for details.');
      }
    }

    function openQuizModal() {
      quizModal.classList.add('open');
      quizStatus.textContent = 'Quiz paused';
      quizWord.textContent = 'Ready?';
      quizPronunciation.textContent = '';
      quizPronunciation.classList.add('hidden');
      quizMeaning.textContent = 'Click start to begin.';
      state.quizQueue = [];
      state.quizMissed = [];
      state.quizCurrent = null;
      state.quizTotal = 0;
      state.quizMode = 'idle';
      state.warOnWrongSet = null;
      quizStart.textContent = 'Start quiz';
      quizStart.disabled = false;
      quizActions.classList.remove('flex');
      quizActions.classList.add('hidden');
    }

    function closeQuizModal() {
      quizModal.classList.remove('open');
      // Let any sequencer awaiting the current round unwind cleanly instead of
      // hanging forever on a promise nobody will ever resolve.
      const resolve = state.quizRoundResolve;
      state.quizRoundResolve = null;
      state.quizSectionQueue = [];
      state.quizSectionIndex = -1;
      state.quizCurrentSection = null;
      if (resolve) resolve();
    }

    function renderQuizCard() {
      const entry = state.quizCurrent;
      quizWord.textContent = entry ? (entry.word || '—') : '—';

      if (entry && quizTogglePronunciation.checked && entry.pronunciation) {
        quizPronunciation.textContent = entry.pronunciation;
        quizPronunciation.classList.remove('hidden');
      } else {
        quizPronunciation.textContent = '';
        quizPronunciation.classList.add('hidden');
      }

      if (entry && quizToggleMeaning.checked) {
        quizMeaning.textContent = entry.englishMeaning || 'No meaning available';
      } else {
        quizMeaning.textContent = '';
      }
    }

    function beginRound(queue) {
      state.quizQueue = queue;
      state.quizMissed = [];
      state.quizTotal = queue.length;
      quizStart.textContent = 'Running...';
      quizStart.disabled = true;
      quizActions.classList.remove('hidden');
      quizActions.classList.add('flex');
      showNextQuizWord();
    }

    function showNextQuizWord() {
      const section = state.quizCurrentSection || 'UNCATEGORIZED';
      if (!state.quizQueue.length) {
        endRound();
        return;
      }
      state.quizCurrent = state.quizQueue.shift();
      renderQuizCard();
      quizStatus.textContent = `${section} — Question ${state.quizTotal - state.quizQueue.length}/${state.quizTotal}`;
    }

    function advanceQuiz() {
      state.quizCurrent = null;
      showNextQuizWord();
    }

    function handleCorrect() {
      if (!state.quizCurrent) return;
      advanceQuiz();
    }

    function handleWrong() {
      if (!state.quizCurrent) return;
      state.quizMissed.push(state.quizCurrent);
      advanceQuiz();
    }

    function endRound() {
      quizActions.classList.remove('flex');
      quizActions.classList.add('hidden');
      quizPronunciation.classList.add('hidden');
      const section = state.quizCurrentSection || 'UNCATEGORIZED';

      if (!state.quizMissed.length) {
        quizStatus.textContent = state.quizMode === 'warOnWrong'
          ? `${section} — WarOnWrong cleared!`
          : `${section} — Quiz complete! No missed words.`;
        quizWord.textContent = 'Done!';
        quizMeaning.textContent = '';
        quizStart.textContent = 'Restart';
        quizStart.disabled = false;
        state.quizMode = 'idle';
        state.warOnWrongSet = null;

        // Resolve this section's round — this is what lets the app-level
        // sequencer move on to the next section only once this one is clear.
        const resolve = state.quizRoundResolve;
        state.quizRoundResolve = null;
        if (resolve) resolve();
        return;
      }

      if (state.quizMode === 'normal') {
        state.warOnWrongSet = state.quizMissed.slice();
        state.quizMode = 'warOnWrong';
      }

      // Do-or-die: every WarOnWrong attempt restarts from the same missed set
      // captured when we first entered it — a single miss resets the whole pass.
      const retryQueue = state.warOnWrongSet.map(entry => ({ ...entry }));
      quizStatus.textContent = `${section} — WarOnWrong: ${retryQueue.length} word(s) — get them all right to finish`;
      beginRound(retryQueue);
    }

    // Reusable core: quizzes a single section (with WarOnWrong retries) to
    // completion. Used both by the section-level Quiz button and as one step
    // of the app-level sequential quiz below.
    function runSectionQuiz(section, entries) {
      return new Promise((resolve) => {
        state.quizCurrentSection = section;
        state.quizRoundResolve = resolve;
        state.quizMode = 'normal';
        state.warOnWrongSet = null;
        beginRound(entries.map(entry => ({ ...entry })));
      });
    }

    async function startSectionQuiz(section) {
      openQuizModal();
      state.quizSectionQueue = [section];
      state.quizSectionIndex = 0;
      quizStatus.textContent = `Loading ${section}…`;
      const entries = await ensureSectionLoaded(section);
      if (!quizModal.classList.contains('open')) return;
      if (!entries.length) {
        quizStatus.textContent = `${section} has no words yet.`;
        return;
      }
      await runSectionQuiz(section, entries);
    }

    async function startAppLevelQuiz() {
      openQuizModal();
      const sections = getSortedSectionNames();
      if (!sections.length) {
        quizStatus.textContent = 'No sections to quiz yet.';
        return;
      }
      state.quizSectionQueue = sections;
      state.quizSectionIndex = 0;
      await runQuizSectionQueue();
    }

    // Sequences through state.quizSectionQueue one section at a time — the next
    // section is only fetched once the current one's round is fully cleared.
    async function runQuizSectionQueue() {
      for (; state.quizSectionIndex < state.quizSectionQueue.length; state.quizSectionIndex++) {
        if (!quizModal.classList.contains('open')) return;
        const section = state.quizSectionQueue[state.quizSectionIndex];
        quizStatus.textContent = `Loading ${section}…`;
        const entries = await ensureSectionLoaded(section);
        if (!quizModal.classList.contains('open')) return;
        if (!entries.length) continue; // nothing to quiz in this section, skip it
        await runSectionQuiz(section, entries);
        if (!quizModal.classList.contains('open')) return;
      }
      quizStatus.textContent = 'All sections complete!';
      quizWord.textContent = 'Done!';
      quizMeaning.textContent = '';
      quizStart.textContent = 'Restart';
      quizStart.disabled = false;
    }

    // The quiz-modal "Start quiz"/"Restart" button re-runs whichever section
    // queue is currently loaded (a single section, or the full app-level list),
    // starting again from the top.
    function restartQuizSequence() {
      if (!state.quizSectionQueue.length) return;
      state.quizSectionIndex = 0;
      runQuizSectionQueue();
    }

    function shuffle(array) {
      const copy = array.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    let cachedVoicesByLang = new Map();

    function normalizeSpeechText(text, language) {
      if (!text) return '';
      const normalized = String(text).trim().replace(/\s+/g, ' ');
      if (language === 'ja') {
        return normalized.replace(/[。！？]/g, '.').replace(/-/g, ' ').replace(/_/g, ' ');
      }
      if (language === 'te') {
        return normalized.replace(/-/g, ' ').replace(/_/g, ' ');
      }
      return normalized;
    }

    function getBestVoice(languageCode) {
      if (cachedVoicesByLang.has(languageCode)) {
        return Promise.resolve(cachedVoicesByLang.get(languageCode));
      }

      return new Promise((resolve) => {
        const pick = (voices) => {
          const normalizedCode = languageCode.toLowerCase();
          const matching = voices.filter(voice => voice.lang && voice.lang.toLowerCase().startsWith(normalizedCode));
          const best = matching.find(voice => /google|natural|enhanced|premium|neural|wave/i.test(voice.name))
            || matching[0]
            || voices.find(voice => voice.lang && voice.lang.toLowerCase().startsWith('en'))
            || voices[0]
            || null;
          cachedVoicesByLang.set(languageCode, best);
          resolve(best);
        };

        const voices = window.speechSynthesis.getVoices();
        if (voices.length) {
          pick(voices);
          return;
        }

        window.speechSynthesis.onvoiceschanged = () => pick(window.speechSynthesis.getVoices());
      });
    }

    async function speak(text, languageCode = 'en-US', rate = 0.95, pitch = 1) {
      if (!text || !('speechSynthesis' in window)) return;
      const voice = await getBestVoice(languageCode);
      return new Promise((resolve) => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = languageCode;
        utterance.rate = rate;
        utterance.pitch = pitch;
        utterance.volume = 1;
        if (voice) utterance.voice = voice;
        utterance.onend = resolve;
        utterance.onerror = resolve;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      });
    }

    async function toSpokenText(text, sourceLang) {
      if (!text) return '';
      if (sourceLang === 'en') return text;

      const normalized = String(text).trim();
      if (sourceLang === 'ja') {
        return normalizeSpeechText(normalized, 'ja');
      }
      if (sourceLang === 'te') {
        return normalizeSpeechText(normalized, 'te');
      }

      const romanized = await getRomanization(text, sourceLang, 'en');
      return romanized || normalized;
    }

    function renderReadingCard(entry) {
      readingWord.textContent = entry.word || '—';
      if (entry.pronunciation) {
        readingPronunciation.textContent = entry.pronunciation;
        readingPronunciation.classList.remove('hidden');
      } else {
        readingPronunciation.textContent = '';
        readingPronunciation.classList.add('hidden');
      }
      readingMeaning.textContent = entry.englishMeaning || 'No meaning available';
    }

    // Announces a new section as reading moves into it — shown on screen and,
    // since reading is a spoken-first interface, also spoken aloud in English
    // (section names are always plain English/Latin text, regardless of which
    // language's words are inside).
    async function announceReadingSection(section) {
      readingWord.textContent = section;
      readingPronunciation.classList.add('hidden');
      readingMeaning.textContent = 'Section';
      await speak(section, 'en-US', 0.95, 1);
    }

    // Reusable core: one shuffled pass through a single section's words, each
    // spoken in full (word, then meanings). Resolves once every word in the
    // pass has been read, or immediately if reading is stopped mid-pass.
    async function runSectionReadingPass(entries) {
      const queue = shuffle(entries);
      for (const entry of queue) {
        if (!state.readingActive) return;
        renderReadingCard(entry);

        // Each piece is spoken with the voice that actually matches its language —
        // reading the English meaning in a Japanese/Telugu voice mispronounces it.
        const nativeLang = langCodeMap[entry.language] || 'ja';
        const speechLanguage = entry.language === 'japanese' ? 'ja-JP' : entry.language === 'telugu' ? 'te-IN' : 'en-US';
        const spokenWord = entry.pronunciation
          ? normalizeSpeechText(entry.pronunciation, entry.language === 'japanese' ? 'ja' : entry.language === 'telugu' ? 'te' : 'en')
          : await toSpokenText(entry.word, nativeLang);

        await speak(spokenWord, speechLanguage, entry.language === 'japanese' ? 0.9 : 0.95, 1);
        if (!state.readingActive) return;

        if (entry.englishMeaning) {
          await speak(entry.englishMeaning, 'en-US', 0.95, 1);
          if (!state.readingActive) return;
        }

        await new Promise(resolve => {
          state.readingTimeoutId = setTimeout(resolve, 2000);
        });
      }
    }

    function openReadingModal() {
      readingModal.classList.add('open');
      readingWord.textContent = 'Read';
      readingPronunciation.classList.add('hidden');
      readingMeaning.textContent = 'Reading mode starting…';
      state.readingActive = true;
    }

    function closeReadingModal() {
      readingModal.classList.remove('open');
      state.readingActive = false;
      if (state.readingTimeoutId) {
        clearTimeout(state.readingTimeoutId);
        state.readingTimeoutId = null;
      }
      window.speechSynthesis.cancel();
      state.readingSectionQueue = [];
      state.readingSectionIndex = -1;
    }

    // Section-level Read button: loads just this section, then loops it
    // indefinitely (announcing it once, then repeating passes) until closed —
    // the same standalone "keep reading this section" behavior as before.
    async function startSectionReading(section) {
      openReadingModal();
      state.readingSectionQueue = [section];
      state.readingSectionIndex = 0;
      readingMeaning.textContent = `Loading ${section}…`;
      const initial = await ensureSectionLoaded(section);
      if (!state.readingActive) return;
      if (!initial.length) {
        readingMeaning.textContent = `${section} has no words yet.`;
        return;
      }

      let announced = false;
      while (state.readingActive) {
        const entries = state.sectionCache.get(section) || [];
        if (!entries.length) break;
        if (!announced) {
          await announceReadingSection(section);
          announced = true;
          if (!state.readingActive) break;
        }
        await runSectionReadingPass(entries);
      }
    }

    // Toolbar Read button: cycles through every section in turn, indefinitely —
    // the next section's words are only fetched once the current section's pass
    // is fully done.
    async function startAppLevelReading() {
      openReadingModal();
      const sections = getSortedSectionNames();
      if (!sections.length) {
        readingMeaning.textContent = 'No sections to read yet.';
        return;
      }
      state.readingSectionQueue = sections;
      state.readingSectionIndex = 0;

      while (state.readingActive) {
        const section = state.readingSectionQueue[state.readingSectionIndex];
        readingMeaning.textContent = `Loading ${section}…`;
        const entries = await ensureSectionLoaded(section);
        if (!state.readingActive) break;

        if (entries.length) {
          await announceReadingSection(section);
          if (!state.readingActive) break;
          await runSectionReadingPass(entries);
        }

        if (!state.readingActive) break;
        state.readingSectionIndex = (state.readingSectionIndex + 1) % state.readingSectionQueue.length;
      }
    }

    function openScriptPracticeModal(scriptKey, label) {
      scriptPracticeTitle.textContent = `${label} Practice`;
      scriptPracticeFrame.src = `hiragana-karuta.html?script=${encodeURIComponent(scriptKey)}`;
      scriptPracticeModal.classList.add('open');
    }

    function closeScriptPracticeModal() {
      scriptPracticeModal.classList.remove('open');
      scriptPracticeFrame.src = 'about:blank';
    }

    languageSelect.addEventListener('change', (event) => {
      switchLanguage(event.target.value);
    });

    searchToggle.addEventListener('click', () => {
      const isOpen = !searchPanel.classList.contains('hidden');
      searchPanel.classList.toggle('hidden', isOpen);
      if (!isOpen) {
        searchInput.focus();
      }
    });

    searchInput.addEventListener('input', (event) => {
      state.query = event.target.value;
      renderCurrentView();
    });

    quizButton.addEventListener('click', () => startAppLevelQuiz());
    quizClose.addEventListener('click', () => closeQuizModal());
    quizStart.addEventListener('click', () => restartQuizSequence());
    quizWrong.addEventListener('click', () => handleWrong());
    quizCorrect.addEventListener('click', () => handleCorrect());
    quizTogglePronunciation.addEventListener('change', () => { if (state.quizCurrent) renderQuizCard(); });
    quizToggleMeaning.addEventListener('change', () => { if (state.quizCurrent) renderQuizCard(); });
    readingButton.addEventListener('click', () => startAppLevelReading());
    readingClose.addEventListener('click', () => closeReadingModal());
    scriptPracticeClose.addEventListener('click', () => closeScriptPracticeModal());

    quickAddInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        advanceQuickAddStage();
      } else if (event.key === 'Escape') {
        quickAddCancel();
      }
    });
    quickAddInput.addEventListener('input', () => startQuickAddChecker());
    quickAddClearBtn.addEventListener('click', () => quickAddCancel());
    quickAddDeleteBtn.addEventListener('click', () => {
      if (!state.quickAdd.editingId || !state.quickAdd.resolved) return;
      deleteWordEntry({
        id: state.quickAdd.editingId,
        section: state.quickAdd.editingOriginSection,
        word: state.quickAdd.resolved.word
      });
    });

    sectionInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        quickAddConfirmCategory();
      } else if (event.key === 'Escape') {
        quickAddCancel();
      }
    });
    sectionInput.addEventListener('input', () => {
      const cursor = sectionInput.selectionStart;
      const upper = sectionInput.value.toUpperCase();
      if (upper !== sectionInput.value) {
        sectionInput.value = upper;
        sectionInput.setSelectionRange(cursor, cursor);
      }
      renderSectionDropdown(sectionInput.value);
    });
    sectionInput.addEventListener('focus', () => renderSectionDropdown(sectionInput.value));
    sectionInput.addEventListener('blur', () => sectionDropdown.classList.add('hidden'));
    sectionDropdown.addEventListener('mousedown', (event) => {
      const optionBtn = event.target.closest('[data-section-option]');
      if (!optionBtn) return;
      event.preventDefault();
      sectionInput.value = optionBtn.getAttribute('data-section-option');
      sectionDropdown.classList.add('hidden');
    });

    groupModeToggle.addEventListener('click', () => {
      state.groupMode = state.groupMode === 'category' ? 'alpha' : 'category';
      groupModeToggle.textContent = state.groupMode === 'category' ? 'Group: Category' : 'Group: A–Z';
      renderCurrentView();
    });
  </script>
</body>
</html>
