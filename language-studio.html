<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: light;
      --panel: #ffffff;
      --panel-strong: #f8fafc;
      --border: #dbe4f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --accent-dark: #1e3a8a;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f8fbff 0%, #eef4ff 100%);
      color: var(--text);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .dict-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    .pill {
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.35rem 0.7rem;
      font-size: 0.8rem;
      background: white;
      color: var(--muted);
    }

    .compact-card {
      padding: 0.45rem 0.6rem;
      border-radius: 0.75rem;
      border: 1px solid #e2e8f0;
      background: white;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    .compact-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    .meaning-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
      font-size: 0.75rem;
      color: #475569;
    }

    .draft-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.7rem;
      background: linear-gradient(135deg, #eff6ff 0%, #f8fbff 100%);
      border-color: #bfdbfe;
    }

    .modal-backdrop {
      display: none;
    }

    .modal-backdrop.open {
      display: flex;
    }
  </style>
</head>
<body>
  <div class="min-h-screen">
    <header class="sticky top-0 z-20 border-b border-slate-200/80 bg-white/75 backdrop-blur">
      <div class="mx-auto flex max-w-7xl flex-col gap-3 px-4 py-4 lg:flex-row lg:items-center lg:justify-between lg:px-6">
        <div>
          <h1 class="text-2xl font-semibold text-slate-900">Language Studio</h1>
        </div>

        <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
          <div class="flex items-center rounded-xl border border-slate-200 bg-white px-3 py-2 shadow-sm">
            <select id="language-select" class="bg-transparent text-sm font-medium text-slate-900 outline-none">
              <option value="japanese">Japanese</option>
              <option value="telugu">Telugu</option>
              <option value="hindi">Hindi</option>
              <option value="tamil">Tamil</option>
              <option value="english">English</option>
            </select>
          </div>

          <label class="flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2 shadow-sm">
            <svg class="h-4 w-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="6"></circle>
              <path d="m20 20-4.2-4.2"></path>
            </svg>
            <input id="dictionary-search" type="search" placeholder="Search words" class="w-40 bg-transparent text-sm text-slate-700 outline-none placeholder:text-slate-400" />
          </label>
          <button id="quiz-button" type="button" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-900 shadow-sm hover:bg-slate-100">QUIZ</button>
          <button id="reading-button" type="button" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-900 shadow-sm hover:bg-slate-100">READ</button>

        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-5 lg:px-6 lg:py-6">
      <div id="add-word-panel" class="hidden mb-4 rounded-2xl border border-slate-200 bg-white p-2 shadow-sm">
        <div class="flex flex-wrap items-end gap-2">
          <label class="min-w-[140px] flex-1">
            <input id="native-word" type="text" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" placeholder="Native" />
          </label>

          <label class="min-w-[140px] flex-1">
            <input id="pronunciation" type="text" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" placeholder="Pronunciation" />
          </label>

          <label class="min-w-[140px] flex-1">
            <input id="telugu-meaning" type="text" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" placeholder="Telugu" />
          </label>

          <label class="min-w-[140px] flex-1">
            <input id="english-meaning" type="text" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" placeholder="English" />
          </label>

          <div class="flex gap-2 items-center">
            <button id="save-to-dictionary" type="button" class="ml-2 rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700">Add</button>
            <button id="clear-form" type="button" class="rounded-lg border border-slate-200 px-4 py-2 text-sm text-slate-600 hover:bg-slate-50">Clear</button>
            <button id="delete-current" type="button" class="hidden rounded-lg border border-rose-200 px-4 py-2 text-sm font-medium text-rose-600 hover:bg-rose-50">Delete</button>
          </div>
        </div>
      </div>

      <section class="glass-card overflow-hidden rounded-3xl border border-slate-200 shadow-[0_10px_40px_rgba(15,23,42,0.06)]">
        <div class="flex items-center justify-end border-b border-slate-200 bg-slate-50 px-4 py-2 text-sm text-slate-600">
          <span id="dictionary-count" class="rounded-full bg-white px-3 py-1 text-xs text-slate-500">0 entries</span>
        </div>

        <div class="max-h-[520px] overflow-y-auto p-3">
          <div id="dictionary-list" class="space-y-2"></div>
        </div>
      </section>

      <div id="quiz-modal" class="modal-backdrop fixed inset-0 z-30 items-center justify-center bg-slate-900/60 px-4 py-6">
        <div class="w-full max-w-sm rounded-2xl bg-white p-4 shadow-2xl">
          <div class="flex items-center justify-between gap-2 border-b border-slate-200 pb-3">
            <div>
              <h2 class="text-base font-semibold text-slate-900">Quiz</h2>
              <p class="text-xs text-slate-500">Miss a word and it comes back until perfect.</p>
            </div>
            <button id="quiz-close" type="button" class="rounded-full border border-slate-200 bg-slate-100 px-2.5 py-1 text-xs hover:bg-slate-200">Close</button>
          </div>

          <div class="mt-3 flex items-center gap-4">
            <label class="inline-flex cursor-pointer items-center gap-1.5 text-xs text-slate-600">
              <span class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full bg-slate-200 transition [&:has(:checked)]:bg-blue-600">
                <input id="quiz-toggle-pronunciation" type="checkbox" class="peer absolute inset-0 h-full w-full cursor-pointer opacity-0" />
                <span class="inline-block h-4 w-4 translate-x-0.5 rounded-full bg-white shadow transition peer-checked:translate-x-4"></span>
              </span>
              Pronunciation
            </label>
            <label class="inline-flex cursor-pointer items-center gap-1.5 text-xs text-slate-600">
              <span class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full bg-slate-200 transition [&:has(:checked)]:bg-blue-600">
                <input id="quiz-toggle-meaning" type="checkbox" class="peer absolute inset-0 h-full w-full cursor-pointer opacity-0" />
                <span class="inline-block h-4 w-4 translate-x-0.5 rounded-full bg-white shadow transition peer-checked:translate-x-4"></span>
              </span>
              Meaning
            </label>
          </div>

          <div class="mt-3 space-y-3">
            <div class="flex items-center justify-between gap-3">
              <span id="quiz-status" class="text-xs font-medium text-slate-600">Quiz paused</span>
              <button id="quiz-start" type="button" class="rounded-lg bg-indigo-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-indigo-700">Start quiz</button>
            </div>
            <div id="quiz-card" class="rounded-2xl border border-slate-200 bg-slate-50 p-5 text-center shadow-sm">
              <div id="quiz-word" class="text-3xl font-semibold text-slate-900">Ready?</div>
              <div id="quiz-pronunciation" class="hidden mt-2 text-sm text-slate-500"></div>
              <div id="quiz-meaning" class="mt-2 text-sm text-slate-600">Click start to begin.</div>
            </div>
            <div id="quiz-actions" class="hidden items-center justify-between gap-3">
              <button id="quiz-wrong" type="button" class="flex-1 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-600 hover:bg-rose-100">Wrong</button>
              <button id="quiz-correct" type="button" class="flex-1 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-semibold text-emerald-600 hover:bg-emerald-100">Correct</button>
            </div>
          </div>
        </div>
      </div>

      <div id="reading-modal" class="modal-backdrop fixed inset-0 z-30 items-center justify-center bg-slate-900/60 px-4 py-6">
        <div class="w-full max-w-sm rounded-2xl bg-white p-4 shadow-2xl">
          <div class="flex items-center justify-end">
            <button id="reading-close" type="button" title="Close" class="rounded-full border border-slate-200 bg-slate-100 p-1.5 text-slate-500 hover:bg-slate-200">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor"><path d="M6.28 5.22a.75.75 0 10-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 10-1.06-1.06L10 8.94 6.28 5.22z"/></svg>
            </button>
          </div>
          <div id="reading-card" class="mt-2 rounded-2xl border border-slate-200 bg-slate-50 p-6 text-center shadow-sm">
            <div id="reading-word" class="text-3xl font-semibold text-slate-900">🔊</div>
            <div id="reading-pronunciation" class="hidden mt-2 text-sm text-slate-500"></div>
            <div id="reading-meaning" class="mt-2 text-sm text-slate-600">Reading mode starting…</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAcahdEVwVPQc5J5ejAvFIAP7zu5ciiOqc",
      authDomain: "kajanaudaynotes.firebaseapp.com",
      databaseURL: "https://kajanaudaynotes-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kajanaudaynotes",
      storageBucket: "kajanaudaynotes.firebasestorage.app",
      messagingSenderId: "696311985600",
      appId: "1:696311985600:web:ceaf9f9fcaf30cabc5c425",
      measurementId: "G-Y9QK783LVC"
    };

    const firebaseApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
    const database = firebase.database(firebaseApp);
    const auth = firebase.auth();
    const wordsRef = database.ref('words');

    

    const languageConfig = {
      japanese: { label: 'Japanese' },
      telugu: { label: 'Telugu' },
      hindi: { label: 'Hindi' },
      tamil: { label: 'Tamil' },
      english: { label: 'English' }
    };

    // ISO codes used by the translation API for each supported language.
    const langCodeMap = {
      japanese: 'ja',
      telugu: 'te',
      hindi: 'hi',
      tamil: 'ta',
      english: 'en'
    };

    const state = {
      language: 'japanese',
      query: '',
      words: [],
      wordIndex: new Map(), // normalized word -> entry id, for O(1) duplicate lookups
      editingId: null,
      quizQueue: [],
      quizMissed: [],
      quizCurrent: null,
      quizTotal: 0,
      quizMode: 'idle',
      warOnWrongSet: null,
      readingActive: false,
      readingQueue: [],
      readingTimeoutId: null
    };

    // auth state and admin flag
    state.currentUser = null;
    state.isAdmin = false;

    auth.onAuthStateChanged(async (user) => {
      state.currentUser = user;
      if (!user) {
        // Not signed in — redirect to login
        // Allow local/demo access if demoUser present
        if (!localStorage.getItem('demoUser')) {
          window.location.href = '/';
          return;
        }
      }

      // Check admin flag in database
      if (user && user.uid) {
        try {
          const snap = await database.ref('admins/' + user.uid).once('value');
          state.isAdmin = !!snap.val();
        } catch (err) {
          console.error('Failed to read admin flag', err);
          state.isAdmin = false;
        }
      }

      // Show the add/edit form only to admins; guests get read-only + quiz.
      addWordPanel.classList.toggle('hidden', !state.isAdmin);

      // Re-render dictionary to reflect admin controls
      renderDictionary();
    });

    const addWordPanel = document.getElementById('add-word-panel');
    const languageSelect = document.getElementById('language-select');
    const searchInput = document.getElementById('dictionary-search');
    const boardPreview = document.getElementById('board-preview');
    const dictionaryList = document.getElementById('dictionary-list');
    const dictionaryCount = document.getElementById('dictionary-count');
    const saveToDictionaryBtn = document.getElementById('save-to-dictionary');
    const clearFormBtn = document.getElementById('clear-form');
    const deleteCurrentBtn = document.getElementById('delete-current');
    const quizButton = document.getElementById('quiz-button');
    const quizModal = document.getElementById('quiz-modal');
    const quizClose = document.getElementById('quiz-close');
    const quizStart = document.getElementById('quiz-start');
    const quizStatus = document.getElementById('quiz-status');
    const quizCard = document.getElementById('quiz-card');
    const quizWord = document.getElementById('quiz-word');
    const quizPronunciation = document.getElementById('quiz-pronunciation');
    const quizMeaning = document.getElementById('quiz-meaning');
    const quizActions = document.getElementById('quiz-actions');
    const quizWrong = document.getElementById('quiz-wrong');
    const quizCorrect = document.getElementById('quiz-correct');
    const quizTogglePronunciation = document.getElementById('quiz-toggle-pronunciation');
    const quizToggleMeaning = document.getElementById('quiz-toggle-meaning');
    const readingButton = document.getElementById('reading-button');
    const readingModal = document.getElementById('reading-modal');
    const readingClose = document.getElementById('reading-close');
    const readingWord = document.getElementById('reading-word');
    const readingPronunciation = document.getElementById('reading-pronunciation');
    const readingMeaning = document.getElementById('reading-meaning');
    const nativeWordInput = document.getElementById('native-word');
    const pronunciationInput = document.getElementById('pronunciation');
    const teluguMeaningInput = document.getElementById('telugu-meaning');
    const englishMeaningInput = document.getElementById('english-meaning');

    function getCurrentLanguageData() {
      return languageConfig[state.language] || languageConfig.japanese;
    }

    function normalize(text) {
      return (text || '').trim().toLowerCase();
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function rebuildWordIndex() {
      state.wordIndex = new Map(state.words.map(entry => [normalize(entry.word), entry.id]));
    }

    function debounce(fn, delay) {
      let timerId;
      return (...args) => {
        clearTimeout(timerId);
        timerId = setTimeout(() => fn(...args), delay);
      };
    }

    async function translateText(text, sourceLang, targetLang) {
      if (!text || sourceLang === targetLang) return '';
      try {
        // Google's free client-side translation endpoint — real machine
        // translation (no API key), unlike MyMemory's crowd-sourced lookup
        // which returns bad matches for short/casual words like "Hi".
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
        const response = await fetch(url);
        const data = await response.json();
        const segments = data && data[0];
        if (!Array.isArray(segments)) return '';
        return segments.map(segment => segment[0] || '').join('').trim();
      } catch (err) {
        console.error('Auto-translation failed', err);
        return '';
      }
    }

    async function getRomanization(text, sourceLang, targetLang) {
      if (!text || sourceLang === 'en') return '';
      try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&dt=rm&q=${encodeURIComponent(text)}`;
        const response = await fetch(url);
        const data = await response.json();
        const segments = data && data[0];
        if (!Array.isArray(segments)) return '';
        // Romanization is appended as an extra segment shaped like [null, null, ...romanizedText].
        const romanEntry = segments.find(segment => segment[0] === null && segment[1] === null);
        if (!romanEntry) return '';
        const romanized = romanEntry.slice(2).find(value => typeof value === 'string' && value.trim());
        return romanized || '';
      } catch (err) {
        console.error('Romanization failed', err);
        return '';
      }
    }

    async function fillPronunciationFromNative() {
      const nativeLang = langCodeMap[state.language] || 'ja';
      if (nativeLang === 'en') return; // already Latin script, nothing to romanize
      if (document.activeElement === pronunciationInput) return;
      if (pronunciationInput.value.trim()) return;

      const nativeText = nativeWordInput.value.trim();
      if (!nativeText) return;

      const romanized = await getRomanization(nativeText, nativeLang, 'en');
      if (romanized && !pronunciationInput.value.trim() && document.activeElement !== pronunciationInput) {
        pronunciationInput.value = romanized;
      }
    }

    async function autoTranslateFrom(sourceKey) {
      const fields = {
        native: { input: nativeWordInput, lang: langCodeMap[state.language] || 'ja' },
        english: { input: englishMeaningInput, lang: 'en' },
        telugu: { input: teluguMeaningInput, lang: 'te' }
      };

      const source = fields[sourceKey];
      const text = source.input.value.trim();
      if (!text) return;

      const targetKeys = Object.keys(fields).filter(key => key !== sourceKey);
      await Promise.all(targetKeys.map(async (key) => {
        const target = fields[key];
        // Don't clobber text the user is actively typing or has already filled in.
        if (document.activeElement === target.input) return;
        if (target.input.value.trim()) return;
        if (target.lang === source.lang) return;

        const translated = await translateText(text, source.lang, target.lang);
        if (translated && !target.input.value.trim() && document.activeElement !== target.input) {
          target.input.value = translated;
        }
      }));

      await fillPronunciationFromNative();
    }

    const debouncedTranslateFromNative = debounce(() => autoTranslateFrom('native'), 700);
    const debouncedTranslateFromEnglish = debounce(() => autoTranslateFrom('english'), 700);
    const debouncedTranslateFromTelugu = debounce(() => autoTranslateFrom('telugu'), 700);

    function getEntriesFromSnapshot(snapshot) {
      const raw = snapshot.val() || {};
      return Object.entries(raw)
        .map(([id, entry]) => ({ id, ...(entry || {}) }))
        .filter(entry => entry.language === state.language)
        .sort((a, b) => (Number(b.createdAt) || 0) - (Number(a.createdAt) || 0));
    }

    async function seedDefaultWordsIfNeeded() {
      const snapshot = await wordsRef.once('value');
      const data = snapshot.val();
      if (data && Object.keys(data).length) {
        return;
      }

      const seedEntries = [
        { word: 'こんにちは', pronunciation: 'kon-ni-chi-wa', englishMeaning: 'Hello', teluguMeaning: 'హలో', language: 'japanese', createdAt: Date.now() },
        { word: 'ありがとう', pronunciation: 'a-ri-ga-to-u', englishMeaning: 'Thank you', teluguMeaning: 'ధన్యవాదాలు', language: 'japanese', createdAt: Date.now() + 1 },
        { word: '学校', pronunciation: 'ga-ku-ko', englishMeaning: 'School', teluguMeaning: 'పాఠశాల', language: 'japanese', createdAt: Date.now() + 2 }
      ];

      const payload = {};
      seedEntries.forEach((entry, index) => {
        payload[`seed-${String(index + 1).padStart(2, '0')}`] = entry;
      });

      await wordsRef.set(payload);
    }

    function renderDictionary() {
      const query = normalize(state.query);
      const filtered = state.words.filter(entry => {
        const haystack = [entry.word, entry.pronunciation, entry.englishMeaning, entry.teluguMeaning]
          .filter(Boolean)
          .join(' ')
          .toLowerCase();
        return haystack.includes(query);
      });

      const items = filtered.slice();
      dictionaryCount.textContent = `${items.length} ${items.length === 1 ? 'entry' : 'entries'}`;
      dictionaryList.innerHTML = '';

      if (!items.length) {
        return;
      }

      items.forEach(entry => {
        const card = document.createElement('article');
        card.className = 'compact-card dict-card transition-all duration-150 flex items-center justify-between py-2';

        const pronunciation = entry.pronunciation || '';
        const teluguMeaning = entry.teluguMeaning || '';
        const englishMeaning = entry.englishMeaning || '';

        card.innerHTML = `
          <div class="min-w-0 flex-1 grid grid-cols-2 gap-x-3 items-start">
            <div class="min-w-[120px] truncate text-sm font-semibold text-slate-900 leading-tight">${escapeHtml(entry.word)}</div>
            <div class="pl-4 truncate text-xs text-slate-600 leading-tight text-left">${escapeHtml(teluguMeaning)}</div>
            <div class="min-w-[120px] truncate text-xs text-slate-500 leading-tight">${escapeHtml(pronunciation)}</div>
            <div class="pl-4 truncate text-xs text-slate-600 leading-tight text-left">${escapeHtml(englishMeaning)}</div>
          </div>
          <div class="flex items-center">
            <button type="button" title="${entry.starred ? 'Remove from quiz' : 'Add to quiz'}" data-action="toggle-star" data-id="${entry.id}" class="star-btn p-2 rounded-md bg-white hover:bg-slate-100">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="${entry.starred ? '#2563eb' : 'none'}" stroke="${entry.starred ? '#2563eb' : '#94a3b8'}" stroke-width="1.5" stroke-linejoin="round">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.286 3.958a1 1 0 00.95.69h4.162c.969 0 1.371 1.24.588 1.81l-3.37 2.448a1 1 0 00-.363 1.118l1.287 3.957c.3.922-.755 1.688-1.538 1.118l-3.37-2.448a1 1 0 00-1.176 0l-3.37 2.448c-.783.57-1.838-.196-1.538-1.118l1.287-3.957a1 1 0 00-.363-1.118l-3.37-2.448c-.783-.57-.38-1.81.588-1.81h4.162a1 1 0 00.95-.69l1.286-3.958z" />
              </svg>
            </button>
            <button type="button" title="${entry.readingEnabled ? 'Remove from reading mode' : 'Add to reading mode'}" data-action="toggle-reading" data-id="${entry.id}" class="reading-btn ml-2 p-2 rounded-md bg-white hover:bg-slate-100">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="${entry.readingEnabled ? '#7c3aed' : '#94a3b8'}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path fill="${entry.readingEnabled ? '#7c3aed' : 'none'}" d="M11.25 5.507v13.185a.75.75 0 01-1.28.53l-4.184-4.183H3.75A1.5 1.5 0 012.25 13.5v-3a1.5 1.5 0 011.5-1.5h2.036l4.184-4.183a.75.75 0 011.28.53z" />
                <path d="M16.5 8.25a4.5 4.5 0 010 7.5" />
                <path d="M18.75 5.25a8.25 8.25 0 010 13.5" />
              </svg>
            </button>
            ${state.isAdmin ? `<button type="button" title="Edit" data-action="edit-mode" data-id="${entry.id}" class="edit-btn ml-2 p-2 rounded-md text-slate-600 hover:bg-slate-100">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z"/></svg>
            </button>` : ''}
          </div>
        `;
        dictionaryList.appendChild(card);
      });
    }

    function renderBoard() {
      const data = getCurrentLanguageData();
      if (boardPreview) boardPreview.innerHTML = '';
    }

    function clearForm() {
      nativeWordInput.value = '';
      pronunciationInput.value = '';
      teluguMeaningInput.value = '';
      englishMeaningInput.value = '';
      nativeWordInput.focus();
    }

    async function addCurrentEntryToDictionary() {
      if (!state.isAdmin) {
        window.alert('You are not authorized to add or edit words.');
        return;
      }

      const word = nativeWordInput.value.trim();
      if (!word) {
        window.alert('Please enter the native word first.');
        return;
      }

      const duplicateId = state.wordIndex.get(normalize(word));
      if (duplicateId && duplicateId !== state.editingId) {
        window.alert(`"${word}" already exists in the ${getCurrentLanguageData().label} dictionary.`);
        return;
      }

      const newEntry = {
        word,
        pronunciation: pronunciationInput.value.trim(),
        teluguMeaning: teluguMeaningInput.value.trim(),
        englishMeaning: englishMeaningInput.value.trim(),
        language: state.language,
        starred: false,
        readingEnabled: false,
        createdAt: Date.now()
      };

      // If editing an existing entry, perform update
      if (state.editingId) {
        const updates = {
          word: newEntry.word,
          pronunciation: newEntry.pronunciation,
          teluguMeaning: newEntry.teluguMeaning,
          englishMeaning: newEntry.englishMeaning
        };
        try {
          console.log('Updating entry', state.editingId, updates);
          if (String(state.editingId).startsWith('local-')) {
            // local-only update
            state.words = state.words.map(w => w.id === state.editingId ? { ...w, ...updates } : w);
            rebuildWordIndex();
            renderDictionary();
            exitEditMode();
            return;
          }
          await wordsRef.child(state.editingId).update(updates);
          exitEditMode();
        } catch (err) {
          console.error('Failed to update entry', err);
          if (err && (err.code === 'PERMISSION_DENIED' || String(err).includes('PERMISSION_DENIED') || String(err).includes('permission_denied'))) {
            window.alert('Permission denied: cannot update. See console.');
            return;
          }
          window.alert('Failed to update entry. See console.');
        }
        return;
      }

      // Otherwise add new entry
      try {
        console.log('Adding entry to Firebase', newEntry);
        await wordsRef.push(newEntry);
        clearForm();
        saveToDictionaryBtn.disabled = true;
        saveToDictionaryBtn.textContent = 'Added';
        setTimeout(() => {
          saveToDictionaryBtn.disabled = false;
          saveToDictionaryBtn.textContent = 'Add';
        }, 1200);
      } catch (err) {
        console.error('Failed to add entry to Firebase', err);
        if (err && (err.code === 'PERMISSION_DENIED' || String(err).includes('PERMISSION_DENIED') || String(err).includes('permission_denied'))) {
          window.alert('Permission denied: Firebase blocked the write. For testing, update your Realtime Database rules or sign in. See console for details.');
          const fallback = { id: 'local-' + Date.now(), ...newEntry };
          state.words.unshift(fallback);
          rebuildWordIndex();
          renderDictionary();
          return;
        }
        window.alert('Failed to add entry. See console for details.');
      }
    }

    async function deleteWordEntry(id) {
      if (!id) return;
      if (!window.confirm('Delete this word?')) return;
      try {
        if (String(id).startsWith('local-')) {
          // local-only entry: remove from UI
          state.words = state.words.filter(w => w.id !== id);
          rebuildWordIndex();
          renderDictionary();
          if (state.editingId === id) exitEditMode();
          return;
        }

        if (!state.isAdmin) {
          window.alert('You are not authorized to delete this entry.');
          return;
        }

        await wordsRef.child(id).remove();
        if (state.editingId === id) exitEditMode();
      } catch (err) {
        console.error('Failed to delete entry', err);
        window.alert('Failed to delete entry. See console for details.');
      }
    }

    async function toggleStarred(entry) {
      if (!entry) return;
      const starred = !entry.starred;
      try {
        if (String(entry.id).startsWith('local-')) {
          state.words = state.words.map(w => w.id === entry.id ? { ...w, starred } : w);
          rebuildWordIndex();
          renderDictionary();
          return;
        }
        await wordsRef.child(entry.id).update({ starred });
      } catch (err) {
        console.error('Failed to toggle star', err);
        window.alert('Failed to update star. See console for details.');
      }
    }

    async function toggleReadingEnabled(entry) {
      if (!entry) return;
      const readingEnabled = !entry.readingEnabled;
      try {
        if (String(entry.id).startsWith('local-')) {
          state.words = state.words.map(w => w.id === entry.id ? { ...w, readingEnabled } : w);
          rebuildWordIndex();
          renderDictionary();
          return;
        }
        await wordsRef.child(entry.id).update({ readingEnabled });
      } catch (err) {
        console.error('Failed to toggle reading mode', err);
        window.alert('Failed to update reading mode. See console for details.');
      }
    }

    function wireRealtimeListener() {
      wordsRef.on('value', (snapshot) => {
        state.words = getEntriesFromSnapshot(snapshot);
        rebuildWordIndex();
        renderDictionary();
      });
    }

    function enterEditMode(entry) {
      if (!entry) return;
      state.editingId = entry.id;
      nativeWordInput.value = entry.word || '';
      pronunciationInput.value = entry.pronunciation || '';
      teluguMeaningInput.value = entry.teluguMeaning || '';
      englishMeaningInput.value = entry.englishMeaning || '';
      saveToDictionaryBtn.textContent = 'Save';
      deleteCurrentBtn.classList.remove('hidden');
      nativeWordInput.focus();
    }

    function exitEditMode() {
      state.editingId = null;
      clearForm();
      saveToDictionaryBtn.textContent = 'Add';
      deleteCurrentBtn.classList.add('hidden');
    }

    function openQuizModal() {
      quizModal.classList.add('open');
      quizStatus.textContent = 'Quiz paused';
      quizWord.textContent = 'Ready?';
      quizPronunciation.textContent = '';
      quizPronunciation.classList.add('hidden');
      quizMeaning.textContent = 'Click start to begin.';
      state.quizQueue = [];
      state.quizMissed = [];
      state.quizCurrent = null;
      state.quizTotal = 0;
      state.quizMode = 'idle';
      state.warOnWrongSet = null;
      quizStart.textContent = 'Start quiz';
      quizStart.disabled = false;
      quizActions.classList.remove('flex');
      quizActions.classList.add('hidden');
    }

    function closeQuizModal() {
      quizModal.classList.remove('open');
    }

    function startQuiz() {
      const queue = state.words.filter(entry => entry.starred).map(entry => ({ ...entry }));
      if (!queue.length) {
        quizStatus.textContent = 'No starred words yet. Star some words to add them to the quiz.';
        return;
      }
      state.quizMode = 'normal';
      state.warOnWrongSet = null;
      beginRound(queue, `${queue.length} word(s) queued`);
    }

    function beginRound(queue, statusText) {
      state.quizQueue = queue;
      state.quizMissed = [];
      state.quizTotal = queue.length;
      quizStatus.textContent = statusText;
      quizStart.textContent = 'Running...';
      quizStart.disabled = true;
      quizActions.classList.remove('hidden');
      quizActions.classList.add('flex');
      showNextQuizWord();
    }

    function renderQuizCard() {
      const entry = state.quizCurrent;
      quizWord.textContent = entry ? (entry.word || '—') : '—';

      if (entry && quizTogglePronunciation.checked && entry.pronunciation) {
        quizPronunciation.textContent = entry.pronunciation;
        quizPronunciation.classList.remove('hidden');
      } else {
        quizPronunciation.textContent = '';
        quizPronunciation.classList.add('hidden');
      }

      if (entry && quizToggleMeaning.checked) {
        const parts = [];
        if (entry.englishMeaning) parts.push(`English: ${entry.englishMeaning}`);
        if (entry.teluguMeaning) parts.push(`Telugu: ${entry.teluguMeaning}`);
        quizMeaning.textContent = parts.join(' · ') || 'No meaning available';
      } else {
        quizMeaning.textContent = '';
      }
    }

    function showNextQuizWord() {
      if (!state.quizQueue.length) {
        endRound();
        return;
      }
      state.quizCurrent = state.quizQueue.shift();
      renderQuizCard();
      quizStatus.textContent = `Question ${state.quizTotal - state.quizQueue.length}/${state.quizTotal}`;
    }

    function advanceQuiz() {
      state.quizCurrent = null;
      showNextQuizWord();
    }

    function handleCorrect() {
      if (!state.quizCurrent) return;
      advanceQuiz();
    }

    function handleWrong() {
      if (!state.quizCurrent) return;
      state.quizMissed.push(state.quizCurrent);
      advanceQuiz();
    }

    function endRound() {
      quizActions.classList.remove('flex');
      quizActions.classList.add('hidden');
      quizPronunciation.classList.add('hidden');

      if (!state.quizMissed.length) {
        quizStatus.textContent = state.quizMode === 'warOnWrong'
          ? 'WarOnWrong cleared! Every missed word answered correctly.'
          : 'Quiz complete! No missed words.';
        quizWord.textContent = 'Done!';
        quizMeaning.textContent = '';
        quizStart.textContent = 'Restart';
        quizStart.disabled = false;
        state.quizMode = 'idle';
        state.warOnWrongSet = null;
        return;
      }

      if (state.quizMode === 'normal') {
        state.warOnWrongSet = state.quizMissed.slice();
        state.quizMode = 'warOnWrong';
      }

      // Do-or-die: every WarOnWrong attempt restarts from the same missed set
      // captured when we first entered it — a single miss resets the whole pass.
      const retryQueue = state.warOnWrongSet.map(entry => ({ ...entry }));
      beginRound(retryQueue, `WarOnWrong: ${retryQueue.length} word(s) — get them all right to finish`);
    }

    function shuffle(array) {
      const copy = array.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    let cachedEnglishVoice;

    function getBestEnglishVoice() {
      if (cachedEnglishVoice !== undefined) return Promise.resolve(cachedEnglishVoice);
      return new Promise((resolve) => {
        const pick = (voices) => {
          const english = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
          const best = english.find(v => /google|natural|enhanced|premium|neural/i.test(v.name)) || english[0] || null;
          cachedEnglishVoice = best;
          resolve(best);
        };
        const voices = window.speechSynthesis.getVoices();
        if (voices.length) {
          pick(voices);
          return;
        }
        window.speechSynthesis.onvoiceschanged = () => pick(window.speechSynthesis.getVoices());
      });
    }

    async function speak(text) {
      if (!text || !('speechSynthesis' in window)) return;
      const voice = await getBestEnglishVoice();
      return new Promise((resolve) => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        if (voice) utterance.voice = voice;
        utterance.onend = resolve;
        utterance.onerror = resolve;
        window.speechSynthesis.speak(utterance);
      });
    }

    // The device's English voice can't pronounce Japanese/Telugu script — it
    // falls back to reading out Unicode character names letter by letter.
    // Romanize anything non-Latin before handing it to speechSynthesis.
    async function toSpokenText(text, sourceLang) {
      if (!text) return '';
      if (sourceLang === 'en') return text;
      const romanized = await getRomanization(text, sourceLang, 'en');
      return romanized || text;
    }

    function renderReadingCard(entry) {
      readingWord.textContent = entry.word || '—';
      if (entry.pronunciation) {
        readingPronunciation.textContent = entry.pronunciation;
        readingPronunciation.classList.remove('hidden');
      } else {
        readingPronunciation.textContent = '';
        readingPronunciation.classList.add('hidden');
      }
      const parts = [];
      if (entry.englishMeaning) parts.push(`English: ${entry.englishMeaning}`);
      if (entry.teluguMeaning) parts.push(`Telugu: ${entry.teluguMeaning}`);
      readingMeaning.textContent = parts.join(' · ') || 'No meaning available';
    }

    async function runReadingLoop() {
      while (state.readingActive) {
        if (!state.readingQueue.length) {
          state.readingQueue = shuffle(state.words.filter(entry => entry.readingEnabled));
          if (!state.readingQueue.length) break; // nothing enabled anymore
        }

        const entry = state.readingQueue.shift();
        renderReadingCard(entry);

        const nativeLang = langCodeMap[entry.language] || 'ja';
        const spokenWord = entry.pronunciation || await toSpokenText(entry.word, nativeLang);
        const spokenTelugu = await toSpokenText(entry.teluguMeaning, 'te');
        const meaningParts = [entry.englishMeaning, spokenTelugu].filter(Boolean);
        const speechText = meaningParts.length ? `${spokenWord} means ${meaningParts.join(', ')}` : spokenWord;

        await speak(speechText);
        if (!state.readingActive) break;

        await new Promise(resolve => {
          state.readingTimeoutId = setTimeout(resolve, 2000);
        });
      }
    }

    function openReadingModal() {
      const pool = state.words.filter(entry => entry.readingEnabled);
      if (!pool.length) {
        window.alert('No words enabled for reading mode yet. Tap the speaker icon on a word first.');
        return;
      }
      readingModal.classList.add('open');
      readingWord.textContent = '🔊';
      readingPronunciation.classList.add('hidden');
      readingMeaning.textContent = 'Reading mode starting…';
      state.readingActive = true;
      state.readingQueue = shuffle(pool);
      runReadingLoop();
    }

    function closeReadingModal() {
      readingModal.classList.remove('open');
      state.readingActive = false;
      if (state.readingTimeoutId) {
        clearTimeout(state.readingTimeoutId);
        state.readingTimeoutId = null;
      }
      window.speechSynthesis.cancel();
    }

    nativeWordInput.addEventListener('input', debouncedTranslateFromNative);
    englishMeaningInput.addEventListener('input', debouncedTranslateFromEnglish);
    teluguMeaningInput.addEventListener('input', debouncedTranslateFromTelugu);

    languageSelect.addEventListener('change', (event) => {
      state.language = event.target.value;
      renderBoard();
      renderDictionary();
    });

    searchInput.addEventListener('input', (event) => {
      state.query = event.target.value;
      renderDictionary();
    });

    dictionaryList.addEventListener('click', (event) => {
      const actionButton = event.target.closest('[data-action]');
      if (!actionButton) return;
      const action = actionButton.getAttribute('data-action');
      const id = actionButton.getAttribute('data-id');
      const entry = state.words.find(item => item.id === id);
      if (action === 'edit-mode') {
        enterEditMode(entry);
      } else if (action === 'toggle-star') {
        toggleStarred(entry);
      } else if (action === 'toggle-reading') {
        toggleReadingEnabled(entry);
      }
    });

    quizButton.addEventListener('click', () => openQuizModal());
    quizClose.addEventListener('click', () => closeQuizModal());
    quizStart.addEventListener('click', () => startQuiz());
    quizWrong.addEventListener('click', () => handleWrong());
    quizCorrect.addEventListener('click', () => handleCorrect());
    quizTogglePronunciation.addEventListener('change', () => { if (state.quizCurrent) renderQuizCard(); });
    quizToggleMeaning.addEventListener('change', () => { if (state.quizCurrent) renderQuizCard(); });
    readingButton.addEventListener('click', () => openReadingModal());
    readingClose.addEventListener('click', () => closeReadingModal());
    saveToDictionaryBtn.addEventListener('click', () => addCurrentEntryToDictionary());
    clearFormBtn.addEventListener('click', () => exitEditMode());
    deleteCurrentBtn.addEventListener('click', () => {
      if (!state.editingId) return;
      deleteWordEntry(state.editingId);
    });

    renderBoard();
    renderDictionary();

    seedDefaultWordsIfNeeded()
      .then(() => {
        wireRealtimeListener();
      })
      .catch((error) => {
        console.error('Firebase initialisation failed', error);
        renderDictionary();
      });
  </script>
</body>
</html>
