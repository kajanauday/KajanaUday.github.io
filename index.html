<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Tech Log</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#f8fafc 0%,#eef2ff 100%); }
    .auth-card { width:100%; max-width:420px; background:#fff; border-radius:1rem; box-shadow:0 18px 45px rgba(15,23,42,.08); overflow:hidden; }
    .auth-header { background:#0f172a; color:#fff; padding:1.25rem 1.5rem; }
    .auth-body { padding:1.5rem; }
    .hint { font-size:.9rem; color:#64748b; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="text-xl font-semibold">Tech Log</h1>
      <p class="mt-1 text-sm text-slate-300">Sign in to continue</p>
    </div>
    <div class="auth-body">
      <p class="hint">Sign in with Google, or with a username and password. Admins are determined by the project's `/admins/{uid}` entry in Firebase Realtime Database.</p>

      <div class="mt-5 space-y-3">
        <button id="google-signin" class="w-full rounded-lg bg-red-600 px-4 py-2.5 font-medium text-white transition hover:bg-red-700">Sign in with Google</button>
        <div class="text-center text-sm text-slate-500">or</div>
        <form id="demo-login-form" class="space-y-3">
          <input id="demo-name" type="text" placeholder="Username" class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" required />
          <input id="demo-password" type="password" placeholder="Password" class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" required />
          <button type="submit" class="w-full rounded-lg bg-slate-900 px-4 py-2.5 font-medium text-white transition hover:bg-slate-800">Sign in</button>
        </form>
      </div>
    </div>
  </div>

    <script>
      // Firebase config should match the project used by language-studio.html
      const firebaseConfig = {
        apiKey: "AIzaSyAcahdEVwVPQc5J5ejAvFIAP7zu5ciiOqc",
        authDomain: "kajanaudaynotes.firebaseapp.com",
        databaseURL: "https://kajanaudaynotes-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kajanaudaynotes",
        storageBucket: "kajanaudaynotes.firebasestorage.app",
        messagingSenderId: "696311985600",
        appId: "1:696311985600:web:ceaf9f9fcaf30cabc5c425",
        measurementId: "G-Y9QK783LVC"
      };

      const firebaseApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      const googleBtn = document.getElementById('google-signin');
      googleBtn.addEventListener('click', async () => {
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          await auth.signInWithPopup(provider);
          // Signed in — redirect to app
          window.location.href = '/language-studio.html';
        } catch (err) {
          console.error('Google sign-in failed', err);
          alert('Google sign-in failed. See console.');
        }
      });

      const form = document.getElementById('demo-login-form');
      const nameInput = document.getElementById('demo-name');
      const passwordInput = document.getElementById('demo-password');

      // Firebase Auth needs an email, so usernames are mapped to a
      // synthetic address under a fixed domain tied to this project.
      const USERNAME_EMAIL_DOMAIN = 'kajanaudaynotes.local';

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const username = nameInput.value.trim().toLowerCase();
        const password = passwordInput.value.trim();

        if (!username || !password) {
          alert('Please enter both fields.');
          return;
        }

        const email = `${username}@${USERNAME_EMAIL_DOMAIN}`;
        try {
          await auth.signInWithEmailAndPassword(email, password);
          window.location.href = '/language-studio.html';
        } catch (err) {
          console.error('Sign-in failed', err);
          alert('Invalid username or password.');
        }
      });
    </script>
</body>
</html>
