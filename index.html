<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Tech Log</title>
  <script>
    // Applied before first paint to avoid a light-mode flash on load.
    if (localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <style>
    :root { color-scheme: light; }
    :root.dark { color-scheme: dark; }
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#f8fafc 0%,#eef2ff 100%); transition: background 0.2s ease; }
    :root.dark body { background:linear-gradient(135deg,#0f172a 0%,#111c33 100%); }
    .auth-card { width:100%; max-width:420px; background:#fff; border-radius:1rem; box-shadow:0 18px 45px rgba(15,23,42,.08); overflow:hidden; }
    :root.dark .auth-card { background:#1e293b; box-shadow:0 18px 45px rgba(0,0,0,.35); }
    .auth-header { background:#0f172a; color:#fff; padding:1.25rem 1.5rem; }
    .auth-body { padding:1.5rem; }
    .hint { font-size:.9rem; color:#64748b; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="text-xl font-semibold">Tech Log</h1>
      <p class="mt-1 text-sm text-slate-300">Sign in to continue</p>
    </div>
    <div class="auth-body">
      <form id="access-code-form" class="space-y-3">
        <input id="access-code" type="password" placeholder="Enter Access Code" class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-200 dark:placeholder:text-slate-500 dark:focus:border-blue-400 dark:focus:ring-blue-900" required />
        <button type="submit" class="w-full rounded-lg bg-slate-900 px-4 py-2.5 font-medium text-white transition hover:bg-slate-800 dark:bg-blue-600 dark:hover:bg-blue-700">Sign in</button>
      </form>

      <p class="mt-6 text-center text-xs text-slate-500 dark:text-slate-400">Looking for gmail login?</p>
      <div class="mt-2 flex justify-center">
        <button id="google-signin" type="button" title="Sign in with Google" class="flex h-14 w-14 items-center justify-center rounded-full border border-slate-200 bg-white shadow-sm transition hover:shadow-md dark:border-slate-600 dark:bg-slate-800 dark:hover:shadow-slate-900/50">
          <svg class="h-8 w-8" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
            <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
            <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
            <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

    <script>
      // Firebase config should match the project used by language-studio.html
      const firebaseConfig = {
        apiKey: "AIzaSyAcahdEVwVPQc5J5ejAvFIAP7zu5ciiOqc",
        authDomain: "kajanaudaynotes.firebaseapp.com",
        databaseURL: "https://kajanaudaynotes-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kajanaudaynotes",
        storageBucket: "kajanaudaynotes.firebasestorage.app",
        messagingSenderId: "696311985600",
        appId: "1:696311985600:web:ceaf9f9fcaf30cabc5c425",
        measurementId: "G-Y9QK783LVC"
      };

      const firebaseApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      const googleBtn = document.getElementById('google-signin');
      googleBtn.addEventListener('click', async () => {
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          await auth.signInWithPopup(provider);
          // Signed in — redirect to app. Role is resolved in language-studio.html
          // via the /admins/{uid} Realtime Database entry; everyone else is a viewer.
          window.location.href = '/language-studio.html';
        } catch (err) {
          console.error('Google sign-in failed', err);
          alert('Google sign-in failed. See console.');
        }
      });

      const accessForm = document.getElementById('access-code-form');
      const accessCodeInput = document.getElementById('access-code');

      // Firebase Auth needs an email and a 6+ char password, so each access
      // code maps to a synthetic account under a fixed domain, with a fixed
      // suffix appended to satisfy Firebase's password length minimum.
      // Firebase rejects unknown codes / wrong passwords — nothing is checked
      // client-side. e.g. code "kajanauday" -> kajanauday@kajanaudaynotes.local.
      const ACCESS_CODE_EMAIL_DOMAIN = 'kajanaudaynotes.local';
      const ACCESS_CODE_PASSWORD_SUFFIX = '-code';

      accessForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const code = accessCodeInput.value.trim();

        if (!code) {
          alert('Please enter an access code.');
          return;
        }

        const email = `${code.toLowerCase()}@${ACCESS_CODE_EMAIL_DOMAIN}`;
        const password = `${code}${ACCESS_CODE_PASSWORD_SUFFIX}`;
        try {
          await auth.signInWithEmailAndPassword(email, password);
          window.location.href = '/language-studio.html';
        } catch (err) {
          console.error('Access code sign-in failed', err);
          alert('Invalid access code.');
        }
      });
    </script>
</body>
</html>
